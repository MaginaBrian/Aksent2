<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AKSENT Admin</title>
    <style>
      :root {
        --bg: #0b0e12;
        --panel: #101621;
        --muted: #8aa1b7;
        --text: #e8eef6;
        --border: rgba(255,255,255,0.08);
        --accent: #c5ff00;
        --danger: #ff4d4d;
        --ok: #2ee59d;
        --shadow: 0 8px 28px rgba(0,0,0,0.45);
        --radius: 14px;
        --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: var(--sans);
        background: radial-gradient(1200px 800px at 20% 0%, rgba(197,255,0,0.08), transparent 55%),
                    radial-gradient(900px 600px at 80% 20%, rgba(80,170,255,0.08), transparent 60%),
                    var(--bg);
        color: var(--text);
      }
      header {
        position: sticky;
        top: 0;
        z-index: 10;
        backdrop-filter: blur(10px);
        background: rgba(11,14,18,0.65);
        border-bottom: 1px solid var(--border);
      }
      .wrap { max-width: 1160px; margin: 0 auto; padding: 18px 18px; }
      .topbar { display: flex; align-items: center; gap: 14px; justify-content: space-between; }
      .brand { font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; font-size: 13px; }
      .pill {
        display: inline-flex; align-items: center; gap: 8px;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: rgba(16,22,33,0.6);
      }
      .pill input {
        width: 260px;
        background: transparent;
        border: 0;
        outline: none;
        color: var(--text);
        font-family: var(--mono);
        font-size: 12px;
      }
      .pill button { white-space: nowrap; }
      .grid {
        display: grid;
        grid-template-columns: 1.2fr 0.8fr;
        gap: 16px;
        padding: 18px;
      }
      @media (max-width: 980px) {
        .grid { grid-template-columns: 1fr; }
        .pill input { width: 180px; }
      }
      .card {
        background: rgba(16,22,33,0.78);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
      }
      .card h2 {
        margin: 0;
        padding: 14px 14px;
        border-bottom: 1px solid var(--border);
        font-size: 14px;
        letter-spacing: 0.03em;
      }
      .card .body { padding: 14px; }
      .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
      .muted { color: var(--muted); font-size: 12px; }
      .btn {
        appearance: none;
        border: 1px solid var(--border);
        background: rgba(255,255,255,0.02);
        color: var(--text);
        border-radius: 10px;
        padding: 10px 12px;
        cursor: pointer;
        font-weight: 600;
      }
      .btn:hover { border-color: rgba(197,255,0,0.35); }
      .btn.primary {
        background: rgba(197,255,0,0.14);
        border-color: rgba(197,255,0,0.35);
      }
      .btn.danger { border-color: rgba(255,77,77,0.35); }
      .btn.danger:hover { border-color: rgba(255,77,77,0.6); }
      .btn.small { padding: 7px 10px; border-radius: 9px; font-size: 12px; }
      .btn.link { background: transparent; border: 0; padding: 0; color: var(--accent); }
      label { display: grid; gap: 6px; font-size: 12px; color: var(--muted); }
      input, textarea, select {
        width: 100%;
        background: rgba(0,0,0,0.15);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 12px;
        color: var(--text);
        outline: none;
      }
      textarea { min-height: 90px; resize: vertical; }
      .list { display: grid; gap: 10px; }
      .item {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        background: rgba(0,0,0,0.12);
      }
      .item h3 { margin: 0 0 6px; font-size: 13px; }
      .item .meta { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
      .badge {
        font-size: 11px;
        padding: 5px 8px;
        border: 1px solid var(--border);
        border-radius: 999px;
        color: var(--muted);
        font-family: var(--mono);
      }
      .thumbs { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
      .thumbs img {
        width: 84px; height: 56px; object-fit: cover;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: rgba(255,255,255,0.04);
      }
      .status {
        font-family: var(--mono);
        font-size: 12px;
        padding: 10px 12px;
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }
      .status .ok { color: var(--ok); }
      .status .err { color: var(--danger); }
      .split { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      @media (max-width: 700px) { .split { grid-template-columns: 1fr; } }
      .hr { height: 1px; background: var(--border); margin: 14px 0; }
      code { font-family: var(--mono); font-size: 12px; color: rgba(232,238,246,0.92); }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap">
        <div class="topbar">
          <div>
            <div class="brand">AKSENT Admin</div>
            <div class="muted">Manage projects and client logos.</div>
          </div>
          <div class="pill">
            <span class="muted">Token</span>
            <input id="token" placeholder="AKSENT_ADMIN_TOKEN" />
            <button class="btn small primary" id="saveToken">Save</button>
            <button class="btn small" id="clearToken">Clear</button>
          </div>
        </div>
      </div>
    </header>

    <main class="grid">
      <section class="card">
        <h2>Projects</h2>
        <div class="body">
          <div class="row" style="justify-content: space-between">
            <div class="muted">Data comes from <code>/api/projects</code></div>
            <div class="row">
              <button class="btn small" id="refreshProjects">Refresh</button>
            </div>
          </div>

          <div class="hr"></div>

          <form id="projectForm">
            <div class="split">
              <label>
                Title
                <input name="title" required />
              </label>
              <label>
                Slug (optional)
                <input name="slug" placeholder="leave blank to auto-generate" />
              </label>
            </div>

            <label style="margin-top: 10px">
              Description
              <textarea name="description"></textarea>
            </label>

            <div class="split" style="margin-top: 10px">
              <label>
                Primary capability (optional)
                <select name="primaryCapability">
                  <option value="">(auto/derived)</option>
                  <option value="campaign">campaign</option>
                  <option value="publications">publications</option>
                  <option value="brand">brand</option>
                  <option value="institutional">institutional</option>
                </select>
              </label>
              <label>
                Mode
                <select name="mode">
                  <option value="create">Create new</option>
                  <option value="update">Update existing</option>
                </select>
              </label>
            </div>

            <label style="margin-top: 10px">
              Target slug (required for Update)
              <input name="targetSlug" placeholder="e.g. amcham" />
            </label>

            <div class="row" style="margin-top: 10px">
              <button class="btn primary" type="submit">Save project</button>
              <button class="btn" type="button" id="resetProjectForm">Reset</button>
            </div>
            <div class="muted" style="margin-top: 8px">
              Tip: after creating a project, upload images using the “Upload image” button in the list.
            </div>
          </form>

          <div class="hr"></div>

          <div class="list" id="projectList"></div>
        </div>
        <div class="status" id="projectStatus">
          <span class="muted">Ready.</span>
          <span class="muted"></span>
        </div>
      </section>

      <section class="card">
        <h2>Client logos</h2>
        <div class="body">
          <div class="row" style="justify-content: space-between">
            <div class="muted">Data comes from <code>/api/client-logos</code></div>
            <button class="btn small" id="refreshLogos">Refresh</button>
          </div>

          <div class="hr"></div>

          <form id="logoUploadForm">
            <label>
              Client name
              <input name="name" required />
            </label>
            <label style="margin-top: 10px">
              Logo file
              <input name="file" type="file" accept="image/*" required />
            </label>
            <div class="row" style="margin-top: 10px">
              <button class="btn primary" type="submit">Upload logo</button>
            </div>
          </form>

          <div class="hr"></div>

          <div class="list" id="logoList"></div>
        </div>
        <div class="status" id="logoStatus">
          <span class="muted">Ready.</span>
          <span class="muted"></span>
        </div>
      </section>
    </main>

    <script>
      const els = {
        token: document.getElementById('token'),
        saveToken: document.getElementById('saveToken'),
        clearToken: document.getElementById('clearToken'),
        refreshProjects: document.getElementById('refreshProjects'),
        refreshLogos: document.getElementById('refreshLogos'),
        projectList: document.getElementById('projectList'),
        logoList: document.getElementById('logoList'),
        projectStatus: document.getElementById('projectStatus'),
        logoStatus: document.getElementById('logoStatus'),
        projectForm: document.getElementById('projectForm'),
        resetProjectForm: document.getElementById('resetProjectForm'),
        logoUploadForm: document.getElementById('logoUploadForm'),
      };

      function setStatus(where, kind, msg, extra = '') {
        const root = where === 'projects' ? els.projectStatus : els.logoStatus;
        const left = root.children[0];
        const right = root.children[1];
        left.className = kind === 'ok' ? 'ok' : kind === 'err' ? 'err' : 'muted';
        left.textContent = msg;
        right.className = 'muted';
        right.textContent = extra;
      }

      function getToken() {
        return (els.token.value || '').trim();
      }

      function authHeaders() {
        const token = getToken();
        return token ? { Authorization: `Bearer ${token}` } : {};
      }

      async function api(path, opts = {}) {
        const res = await fetch(path, opts);
        if (!res.ok) {
          const text = await res.text().catch(() => '');
          throw new Error(`HTTP ${res.status}: ${text || res.statusText}`);
        }
        const ct = res.headers.get('content-type') || '';
        if (ct.includes('application/json')) return await res.json();
        return await res.text();
      }

      function escapeHtml(s) {
        return String(s || '').replace(/[&<>"']/g, (c) => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#039;',
        }[c]));
      }

      function byId(id) { return document.getElementById(id); }

      // Token persistence
      const saved = localStorage.getItem('aksent_admin_token') || '';
      els.token.value = saved;
      els.saveToken.addEventListener('click', () => {
        localStorage.setItem('aksent_admin_token', getToken());
        setStatus('projects', 'ok', 'Token saved.');
        setStatus('logos', 'ok', 'Token saved.');
      });
      els.clearToken.addEventListener('click', () => {
        els.token.value = '';
        localStorage.removeItem('aksent_admin_token');
        setStatus('projects', 'ok', 'Token cleared.');
        setStatus('logos', 'ok', 'Token cleared.');
      });

      async function loadProjects() {
        setStatus('projects', 'muted', 'Loading projects…');
        const rows = await api('/api/projects');
        renderProjects(Array.isArray(rows) ? rows : []);
        setStatus('projects', 'ok', 'Projects loaded.', `${rows.length} items`);
      }

      function renderProjects(projects) {
        els.projectList.innerHTML = '';
        if (!projects.length) {
          els.projectList.innerHTML = `<div class="muted">No projects yet.</div>`;
          return;
        }

        for (const p of projects) {
          const id = `upload_${p.slug}`;
          const wrap = document.createElement('div');
          wrap.className = 'item';

          const thumbs = (p.images || []).slice(0, 6).map((src) => `<img src="${escapeHtml(src)}" alt="" />`).join('');
          wrap.innerHTML = `
            <div class="meta" style="justify-content: space-between;">
              <div>
                <h3>${escapeHtml(p.title || '(untitled)')}</h3>
                <div class="meta">
                  <span class="badge">slug: ${escapeHtml(p.slug)}</span>
                  ${p.primaryCapability ? `<span class="badge">cap: ${escapeHtml(p.primaryCapability)}</span>` : `<span class="badge">cap: (derived)</span>`}
                  <span class="badge">${(p.images || []).length} images</span>
                </div>
              </div>
              <div class="row">
                <button class="btn small" data-action="prefill" data-slug="${escapeHtml(p.slug)}">Edit</button>
                <button class="btn small danger" data-action="delete" data-slug="${escapeHtml(p.slug)}">Delete</button>
              </div>
            </div>
            ${p.description ? `<div class="muted" style="margin-top:8px">${escapeHtml(p.description)}</div>` : ''}
            <div class="thumbs">${thumbs}</div>
            <div class="row" style="margin-top:10px; justify-content: space-between;">
              <label style="max-width: 420px">
                Upload image to this project
                <input id="${id}" type="file" accept="image/*" />
              </label>
              <button class="btn small primary" data-action="uploadImage" data-slug="${escapeHtml(p.slug)}" data-input="${id}">Upload image</button>
            </div>
          `;

          wrap.addEventListener('click', async (e) => {
            const btn = e.target.closest('button[data-action]');
            if (!btn) return;
            const action = btn.dataset.action;
            const slug = btn.dataset.slug;

            if (action === 'prefill') {
              els.projectForm.mode.value = 'update';
              els.projectForm.targetSlug.value = slug;
              els.projectForm.slug.value = '';
              els.projectForm.title.value = p.title || '';
              els.projectForm.description.value = p.description || '';
              els.projectForm.primaryCapability.value = p.primaryCapability || '';
              window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            if (action === 'delete') {
              if (!confirm(`Delete project "${p.title}" (${slug})?`)) return;
              try {
                setStatus('projects', 'muted', 'Deleting…');
                await api(`/api/projects/${encodeURIComponent(slug)}`, {
                  method: 'DELETE',
                  headers: { ...authHeaders() },
                });
                setStatus('projects', 'ok', 'Deleted.');
                await loadProjects();
              } catch (err) {
                setStatus('projects', 'err', 'Delete failed.', err.message);
              }
            }

            if (action === 'uploadImage') {
              const inputId = btn.dataset.input;
              const fileInput = byId(inputId);
              const file = fileInput?.files?.[0];
              if (!file) {
                setStatus('projects', 'err', 'Choose a file first.');
                return;
              }
              const fd = new FormData();
              fd.append('file', file);
              try {
                setStatus('projects', 'muted', 'Uploading image…');
                await api(`/api/projects/${encodeURIComponent(slug)}/images`, {
                  method: 'POST',
                  headers: { ...authHeaders() },
                  body: fd,
                });
                setStatus('projects', 'ok', 'Image uploaded.');
                await loadProjects();
              } catch (err) {
                setStatus('projects', 'err', 'Upload failed.', err.message);
              } finally {
                if (fileInput) fileInput.value = '';
              }
            }
          });

          els.projectList.appendChild(wrap);
        }
      }

      async function loadLogos() {
        setStatus('logos', 'muted', 'Loading logos…');
        const rows = await api('/api/client-logos');
        renderLogos(Array.isArray(rows) ? rows : []);
        setStatus('logos', 'ok', 'Logos loaded.', `${rows.length} items`);
      }

      function renderLogos(logos) {
        els.logoList.innerHTML = '';
        if (!logos.length) {
          els.logoList.innerHTML = `<div class="muted">No logos yet.</div>`;
          return;
        }
        for (const l of logos) {
          const wrap = document.createElement('div');
          wrap.className = 'item';
          wrap.innerHTML = `
            <div class="meta" style="justify-content: space-between;">
              <div>
                <h3>${escapeHtml(l.name || '(unnamed)')}</h3>
                <div class="meta">
                  <span class="badge">${escapeHtml(l.logo || '')}</span>
                </div>
              </div>
              <div class="row">
                <button class="btn small danger" data-action="deleteLogo">Delete</button>
              </div>
            </div>
            ${l.logo ? `<div class="thumbs"><img src="${escapeHtml(l.logo)}" alt="${escapeHtml(l.name)}" style="width:120px;height:72px;object-fit:contain;padding:6px;background:rgba(255,255,255,0.03)"/></div>` : ''}
          `;
          wrap.querySelector('button[data-action="deleteLogo"]').addEventListener('click', async () => {
            if (!confirm(`Delete logo "${l.name}"?`)) return;
            try {
              setStatus('logos', 'muted', 'Deleting…');
              await api(`/api/client-logos?name=${encodeURIComponent(l.name)}`, {
                method: 'DELETE',
                headers: { ...authHeaders() },
              });
              setStatus('logos', 'ok', 'Deleted.');
              await loadLogos();
            } catch (err) {
              setStatus('logos', 'err', 'Delete failed.', err.message);
            }
          });
          els.logoList.appendChild(wrap);
        }
      }

      els.refreshProjects.addEventListener('click', () => loadProjects().catch((e) => setStatus('projects', 'err', 'Load failed.', e.message)));
      els.refreshLogos.addEventListener('click', () => loadLogos().catch((e) => setStatus('logos', 'err', 'Load failed.', e.message)));

      els.resetProjectForm.addEventListener('click', () => {
        els.projectForm.reset();
        els.projectForm.mode.value = 'create';
        setStatus('projects', 'ok', 'Form reset.');
      });

      els.projectForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData(els.projectForm);
        const mode = fd.get('mode');
        const title = String(fd.get('title') || '').trim();
        const slug = String(fd.get('slug') || '').trim();
        const description = String(fd.get('description') || '').trim();
        const primaryCapability = String(fd.get('primaryCapability') || '').trim();
        const targetSlug = String(fd.get('targetSlug') || '').trim();

        const payload = {
          title,
          slug: slug || undefined,
          description,
          primaryCapability: primaryCapability || undefined,
        };

        try {
          setStatus('projects', 'muted', 'Saving…');
          if (mode === 'create') {
            await api('/api/projects', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', ...authHeaders() },
              body: JSON.stringify(payload),
            });
            setStatus('projects', 'ok', 'Project created.');
          } else {
            if (!targetSlug) {
              setStatus('projects', 'err', 'Target slug is required for update.');
              return;
            }
            await api(`/api/projects/${encodeURIComponent(targetSlug)}`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json', ...authHeaders() },
              body: JSON.stringify(payload),
            });
            setStatus('projects', 'ok', 'Project updated.');
          }
          await loadProjects();
        } catch (err) {
          setStatus('projects', 'err', 'Save failed.', err.message);
        }
      });

      els.logoUploadForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData(els.logoUploadForm);
        const name = String(fd.get('name') || '').trim();
        const file = els.logoUploadForm.file.files?.[0];
        if (!file) {
          setStatus('logos', 'err', 'Pick a logo file first.');
          return;
        }
        const body = new FormData();
        body.append('name', name);
        body.append('file', file);
        try {
          setStatus('logos', 'muted', 'Uploading…');
          await api('/api/client-logos/upload', {
            method: 'POST',
            headers: { ...authHeaders() },
            body,
          });
          setStatus('logos', 'ok', 'Logo uploaded.');
          els.logoUploadForm.reset();
          await loadLogos();
        } catch (err) {
          setStatus('logos', 'err', 'Upload failed.', err.message);
        }
      });

      // Initial load
      Promise.all([loadProjects(), loadLogos()]).catch(() => {});
    </script>
  </body>
</html>
